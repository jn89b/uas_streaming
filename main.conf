# MAVLink Router configuration
# Choose ONE ingestion source below:
#   1. Serial FC via /dev/ttyACM0
#   2. Incoming UDP MAVLink on port 14551

[General]
TcpServerPort=0
MavlinkDialect=ardupilotmega

############################################################
# INGESTION OPTION 1: Flight controller connected by USB/serial
# Keep this enabled when the FC is physically connected to /dev/ttyACM0.
############################################################

[UartEndpoint FC]
Device=/dev/ttyACM0
Baud=57600

############################################################
# INGESTION OPTION 2: Incoming MAVLink over UDP
# To use this instead of serial:
#   1. Comment out the entire [UartEndpoint FC] block above.
#   2. Uncomment this block.
#   3. Send MAVLink to <PI_IP>:14551.
############################################################

#[UdpEndpoint IngestUDP]
#Mode=Server
#Address=0.0.0.0
#Port=14551

############################################################
# OUTBOUND DESTINATIONS
############################################################

# To SEME — do not change unless their IP changes
[UdpEndpoint SEME]
Mode=Normal
Address=100.106.38.39
Port=14550

# Server gateway
[UdpEndpoint Server]
Mode=Normal
Address=100.66.169.113
Port=14550

# Ground station / Mission Planner
[UdpEndpoint MissionPlannerGCS]
Mode=Normal
Address=100.92.248.58
Port=14550